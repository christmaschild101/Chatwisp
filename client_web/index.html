<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chatwisp - Accessible Forum</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <header role="banner">
    <h1 id="app-title">Chatwisp</h1>
    <nav id="main-nav" role="navigation" aria-label="Main navigation" hidden>
      <button id="home-btn" class="nav-btn" onclick="showMainMenu()">Home</button>
      <button id="messages-btn" class="nav-btn" onclick="showDmList()">Messages</button>
    </nav>
  </header>

  <main id="main-content" role="main">
    <div id="view-login" class="view" aria-label="Login screen">
      <h2 id="login-title">Login / Register</h2>
      <form id="login-form" onsubmit="event.preventDefault(); doLogin();" aria-label="Login form">
        <div class="form-group">
          <label for="login-username">Username:</label>
          <input type="text" id="login-username" autocomplete="username">
        </div>
        <div class="form-group">
          <label for="login-password">Password:</label>
          <input type="password" id="login-password" autocomplete="current-password">
        </div>
        <div class="btn-group">
          <button type="submit" id="login-btn">Login</button>
          <button type="button" id="register-btn" onclick="doRegister()">Register</button>
        </div>
        <p id="login-error" role="alert" aria-live="assertive" class="error-text" hidden></p>
      </form>
    </div>

    <div id="view-main" class="view" hidden aria-label="Main menu">
      <section id="admin-controls" aria-label="Admin controls" hidden>
        <h3>Admin Controls</h3>
        <div class="btn-group">
          <button id="accounts-btn" onclick="showAccounts()">Manage Accounts</button>
          <button id="new-forum-btn" onclick="showCreateForum()">New Forum</button>
          <button id="set-motd-btn" onclick="showSetMotd()">Set MOTD</button>
        </div>
      </section>

      <section id="top-controls" aria-label="Topic controls" hidden>
        <div class="btn-group">
          <button id="new-topic-btn" onclick="showCreateTopic()">New Topic</button>
          <button id="admin-topic-close-btn" onclick="adminCloseTopic()" hidden>Close Topic</button>
          <button id="admin-topic-reopen-btn" onclick="adminReopenTopic()" hidden>Reopen Topic</button>
          <button id="admin-topic-adminonly-btn" onclick="adminToggleAdminOnly()" hidden>Make Admin Only</button>
        </div>
      </section>

      <section id="forum-section" aria-label="Forums list">
        <h2 id="section-title">Select Forum</h2>
        <div id="forum-list" role="list" aria-label="Available forums"></div>
      </section>

      <section id="topic-section" aria-label="Topics list" hidden>
        <h2 id="topic-section-title">Topics</h2>
        <div id="topic-list" role="list" aria-label="Topics"></div>
      </section>

      <section id="post-section" aria-label="Posts" hidden>
        <h2 id="post-section-title">Posts</h2>
        <div id="post-list" role="list" aria-label="Post contents"></div>
        <div id="reply-area" hidden>
          <h3>Write a Reply</h3>
          <textarea id="reply-content" rows="3" aria-label="Your reply"></textarea>
          <button id="send-reply-btn" onclick="sendReply()">Send Reply</button>
          <p id="topic-closed-msg" role="alert" class="info-text" hidden>This topic is closed. No new replies can be added.</p>
          <p id="topic-adminonly-msg" role="alert" class="info-text" hidden>This topic is admin only. Only admins can post here.</p>
        </div>
      </section>
    </div>

    <div id="view-dm-list" class="view" hidden aria-label="Messages">
      <h2>Messages</h2>
      <button onclick="showDmSearch()">New Message</button>
      <div id="dm-contacts-list" role="list" aria-label="Conversations"></div>
      <button onclick="showMainMenu()">Back to Main Menu</button>
    </div>

    <div id="view-dm-search" class="view" hidden aria-label="Search users">
      <h2>Search Users</h2>
      <div class="form-group">
        <label for="dm-search-input">Username:</label>
        <input type="text" id="dm-search-input" autocomplete="off" oninput="searchUsers()">
      </div>
      <div id="dm-search-results" role="list" aria-label="Search results"></div>
      <button onclick="showDmList()">Back to Messages</button>
    </div>

    <div id="view-dm-chat" class="view" hidden aria-label="Chat">
      <h2 id="dm-chat-title">Chat</h2>
      <div id="dm-message-list" role="list" aria-label="Messages"></div>
      <div id="dm-reply-area">
        <textarea id="dm-input" rows="2" aria-label="Type a message" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendDm();}"></textarea>
        <button id="dm-send-btn" onclick="sendDm()">Send</button>
      </div>
      <button onclick="showDmList()">Back to Messages</button>
    </div>

    <div id="view-accounts" class="view" hidden aria-label="Accounts management">
      <h2>User Accounts</h2>
      <div id="users-list" role="list" aria-label="User accounts"></div>
      <button onclick="showMainMenu()">Back to Main Menu</button>
    </div>

    <div id="view-create-topic" class="view" hidden aria-label="Create new topic">
      <h2>Create New Topic</h2>
      <form id="create-topic-form" onsubmit="event.preventDefault(); submitCreateTopic();">
        <div class="form-group">
          <label for="topic-title">Topic Title:</label>
          <input type="text" id="topic-title" autocomplete="off">
        </div>
        <div class="form-group">
          <label for="topic-content">First Post (optional):</label>
          <textarea id="topic-content" rows="5"></textarea>
        </div>
        <div class="form-group" id="topic-admin-only-group" hidden>
          <label>
            <input type="checkbox" id="topic-admin-only" value="1">
            Admin only (only admins can post)
          </label>
        </div>
        <div class="btn-group">
          <button type="submit">Create Topic</button>
          <button type="button" onclick="showMainMenu()">Cancel</button>
        </div>
      </form>
    </div>

    <div id="view-create-forum" class="view" hidden aria-label="Create new forum">
      <h2>Create New Forum</h2>
      <form id="create-forum-form" onsubmit="event.preventDefault(); submitCreateForum();">
        <div class="form-group">
          <label for="forum-name">Forum Name:</label>
          <input type="text" id="forum-name" autocomplete="off">
        </div>
        <div class="form-group">
          <label for="forum-desc">Description:</label>
          <input type="text" id="forum-desc" autocomplete="off">
        </div>
        <div class="btn-group">
          <button type="submit">Create Forum</button>
          <button type="button" onclick="showMainMenu()">Cancel</button>
        </div>
      </form>
    </div>
  </main>

  <footer id="status-bar" role="status" aria-live="polite" aria-atomic="true">
    Not connected
  </footer>
</div>

<script src="app.js"></script>
</body>
</html>
